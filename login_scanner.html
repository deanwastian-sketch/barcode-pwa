<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EAN prijava</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, Arial, sans-serif;
    }
    .top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px;
      background: rgba(0,0,0,.7);
      z-index: 10;
    }
    #scanner {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div class="top">
    <b>Poskeniraj svojo EAN kodo za prijavo</b>
  </div>

  <!-- ⚠️ TA DIV JE KLJUČEN -->
  <div id="scanner"></div>

  <script src="quagga.min.js"></script>
  <script src="login_scanner.js"></script>
  <div id="toast" style="
  display:none;
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2e7d32;
  color:white;
  padding:14px 20px;
  border-radius:12px;
  font-size:18px;
  z-index:1000;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
">
  ✅ Prijava uspešna
</div>
</body>
</html>
