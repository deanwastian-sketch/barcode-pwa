<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kviz Skeniranja Artiklov</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
#scanner {
    width: 100%;
    height: 300px;
    background: #000;
    margin-bottom: 20px;
}
#productInfo {
    display: none;
    margin-bottom: 10px;
}
#answerSection {
    display: none;
    margin-bottom: 20px;
}
#resultsSection {
    display: none;
    margin-top: 20px;
}
#hintModal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}
#hintModal.show {
    display: flex;
}
#hintModalContent {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    max-width: 300px;
}
.closeBtn {
    cursor: pointer;
    float: right;
    font-weight: bold;
}
button { padding: 10px 15px; font-size: 16px; }
input[type=text] { padding: 8px; width: 60%; font-size: 16px; }
</style>
</head>
<body>

<h2>Kviz Skeniranja Artiklov</h2>

<p id="instructions">Poskenirajte artikel in vnesite svoj odgovor.</p>
<p id="progress">Artikel 0 / 4</p>

<button onclick="startScanner()">Zaženi kamero</button>
<div id="scanner"></div>

<div id="productInfo">
    <p><strong>Naziv:</strong> <span id="productName"></span></p>
    <p><strong>Opis:</strong> <span id="productDesc"></span></p>
    <p><strong>Skladišče:</strong> <span id="productWarehouse"></span></p>
    <p><strong>Zaloga:</strong> <span id="productStock"></span></p>
    <p><strong>Zadnje naročilo:</strong> <span id="productLastOrder"></span></p>
    <button onclick="showHint()">Namig ?</button>
</div>

<div id="answerSection">
    <input type="text" id="userAnswer" placeholder="Vnesite svoj odgovor">
    <button onclick="submitAnswer()">Shrani</button>
</div>

<div id="resultsSection">
    <h3>Rezultati</h3>
    <table border="1">
        <thead>
            <tr><th>Artikel</th><th>Odgovor</th></tr>
        </thead>
        <tbody id="resultsTable"></tbody>
    </table>
</div>

<!-- Modal za namig -->
<div id="hintModal">
    <div id="hintModalContent">
        <span class="closeBtn">&times;</span>
        <p id="modalHintText"></p>
    </div>
</div>

<script src="quagga.min.js"></script>
<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
