<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kviz Skeniranja Artiklov</title>
<style>
body { font-family: Arial, sans-serif; padding: 10px; font-size: 18px; }
h2 { font-size: 26px; }
button { padding: 10px 20px; font-size: 18px; margin-top: 10px; cursor: pointer; }

#progressContainer { margin-top: 10px; background: #ccc; height: 25px; width: 100%; border-radius: 5px; }
#progressBar { height: 100%; width: 0%; background: #4caf50; border-radius: 5px; }

#productInfo { display: none; margin-top: 10px; font-size: 18px; }
#productInfo p { margin: 5px 0; }

#answerSection { display: none; margin-top: 10px; }
#answerSection input { font-size: 18px; padding: 5px; width: 70%; }
#answerSection button { margin-left: 10px; font-size: 18px; }

#resultsTable { display: none; margin-top: 20px; border-collapse: collapse; width: 100%; font-size: 18px; }
#resultsTable th, #resultsTable td { border: 1px solid #000; padding: 8px; text-align: left; }
</style>
</head>
<body>

<h2>Kviz Skeniranja Artiklov</h2>
<p>Klikni gumb, da zaženeš kamero in poskeniraš artikel.</p>
<button id="startBtn">Zaženi kamero</button>

<div id="progressContainer">
    <div id="progressBar"></div>
</div>

<div id="productInfo">
    <p><strong>Naziv:</strong> <span id="productName"></span></p>
    <p><strong>Opis:</strong> <span id="productDesc"></span></p>
</div>

<div id="answerSection">
    <input type="text" id="userAnswer" placeholder="Vnesi svoj odgovor">
    <button id="saveBtn">Shrani</button>
</div>

<table id="resultsTable">
    <thead>
        <tr>
            <th>Artikel</th>
            <th>Uporabnikov odgovor</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
