<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kviz Skeniranja Artiklov</title>
<style>
body { font-family: Arial, sans-serif; padding: 10px; }
h2 { font-size: 24px; }
button { padding: 10px 20px; font-size: 18px; margin-top: 10px; cursor: pointer; }

#scanner {
    width: 100%;
    height: 300px;
    background: #000;
    margin-top: 10px;
    position: relative;
    z-index: 1;
}

#productInfo { 
    display: none; 
    margin-top: 10px; 
    font-size: 18px; 
    position: relative;
    z-index: 10; /* nad video layer */
}
#productInfo p { margin: 5px 0; }
</style>
</head>
<body>

<h2>Kviz Skeniranja Artiklov</h2>
<p>Klikni gumb, da zaženeš kamero in poskeniraš artikel.</p>
<button onclick="startScanner()">Zaženi kamero</button>

<div id="scanner"></div>

<div id="productInfo">
    <p><strong>Naziv:</strong> <span id="productName"></span></p>
    <p><strong>Opis:</strong> <span id="productDesc"></span></p>
</div>

<script src="quagga.min.js"></script>
<script src="products.js"></script>
<script src="app.js"></script>

</body>
</html>
