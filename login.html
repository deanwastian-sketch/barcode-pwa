<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prijava</title>

  <style>
    body { margin:0; font-family: system-ui; background:#f5f7f8; }
    .wrap { max-width:480px; margin:auto; padding:16px; text-align:center; }
    .card {
      background:#fff;
      border-radius:14px;
      padding:16px;
      box-shadow:0 4px 12px rgba(0,0,0,.1);
    }
    img { width:100%; border-radius:12px; }
    button {
      margin-top:14px;
      width:100%;
      padding:14px;
      font-size:20px;
      font-weight:700;
      border:0;
      border-radius:12px;
      background:#2e7d32;
      color:#fff;
      cursor:pointer;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h2>Dobrodošli</h2>

    <div class="card">
      <img src="qr_koda_50.png" alt="Prijava" />
      <button id="loginBtn">PRIJAVA</button>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
